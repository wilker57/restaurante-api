spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:restauranteTestDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show-sql: false
    open-in-view: false

app:
  seed:
    enabled: true
